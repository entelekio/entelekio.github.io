<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entelekio</title>
  <meta name="robots" content="noindex">
  <style>
    @import url(https://fonts.bunny.net/css?family=jost:400);

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Jost', sans-serif;
      background: #F9F8F5;
      color: #0D0D0D;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    main {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(2.5rem, 10vw, 6rem);
      font-weight: 400;
      letter-spacing: 0.35em;
      line-height: 1;
      margin-bottom: 2rem;
    }

    p {
      font-size: clamp(0.8rem, 2vw, 0.95rem);
      letter-spacing: 0.1em;
      color: #888;
      line-height: 1.9;
    }
  </style>
</head>
<body>
  <main>
    <h1>ENTELEKIO</h1>
    <p>
      Private and convenient digital life.<br />
      Your data lives in your devices. All of them.
    </p>
  </main>
</body>
</html>
